<section class="min-h-screen bg-slate-50 p-6 text-slate-900 md:p-10">
  <header class="mx-auto mb-8 max-w-7xl">
    <h1 class="text-3xl font-bold tracking-tight">Playground</h1>
    <p class="mt-2 text-sm text-slate-600">Home</p>
  </header>

  <section class="mx-auto mb-8 max-w-7xl" *ngFor="let category of categories">
    <h2 class="mb-4 text-xl font-semibold">{{ category.label }}</h2>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <article class="flex h-full flex-col justify-between rounded-lg border border-slate-200 bg-white p-4 shadow-sm" *ngFor="let item of category.items">
        <div>
          <h3 class="text-base font-semibold">{{ item.title }}</h3>
          <p class="mt-1 text-sm text-slate-600">{{ item.description }}</p>
          <code class="mt-3 inline-block rounded bg-slate-100 px-2 py-1 text-xs text-slate-700">/{{ item.path }}</code>
        </div>
        <a [routerLink]="['/', item.path]" class="mt-4 inline-flex w-fit items-center gap-1 text-sm font-medium text-blue-600 hover:text-blue-800">
          Open demo <span aria-hidden="true">→</span>
        </a>
      </article>
    </div>
  </section>
</section>
