<div
  class="w-full max-w-[18.5rem] rounded-2xl border p-3 shadow-sm"
  style="border-color: var(--tng-semantic-border-subtle); background: linear-gradient( 180deg, color-mix(in srgb, var(--tng-semantic-background-base) 92%, var(--tng-semantic-background-surface) 8%), color-mix(in srgb, var(--tng-semantic-background-base) 76%, var(--tng-semantic-background-surface) 24%) ); color: var(--tng-semantic-foreground-primary);"
>
  <tng-datepicker
    class="block w-full"
    [defaultOpen]="false"
    [defaultValue]="'2024-04-22'"
    [today]="'2024-04-18'"
    [minDate]="'2024-04-01'"
    [maxDate]="'2026-03-31'"
    [fullWidth]="false"
    ariaLabel="Invoice date"
  ></tng-datepicker>
</div>
<br/>
<div
  class="w-full max-w-[18.5rem] rounded-2xl border p-3 shadow-sm"
  style="border-color: var(--tng-semantic-border-subtle); background: linear-gradient( 180deg, color-mix(in srgb, var(--tng-semantic-background-base) 92%, var(--tng-semantic-background-surface) 8%), color-mix(in srgb, var(--tng-semantic-background-base) 76%, var(--tng-semantic-background-surface) 24%) ); color: var(--tng-semantic-foreground-primary);"
>
  <tng-datepicker
    class="block w-full"
    [defaultOpen]="false"
    [adapter]="reportingAdapter"
    [defaultValue]="'2024-04-22'"
    [today]="'2024-04-18'"
    [fullWidth]="false"
    ariaLabel="Reporting date"
  ></tng-datepicker>
</div>
