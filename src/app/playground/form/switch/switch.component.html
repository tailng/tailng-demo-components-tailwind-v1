<section class="grid w-full max-w-[28rem] gap-3 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [color-scheme:light]">
  <p class="m-0 text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">Deployment</p>
  <tng-switch
    class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#0f172a]"
    [checked]="autoPublish()"
    (checkedChange)="autoPublish.set($event)"
  >
    Auto publish after review
  </tng-switch>
</section>
<br/>
<section class="grid w-full max-w-[30rem] gap-4 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [color-scheme:light]">
  <div class="grid gap-1">
    <h3 class="m-0 text-base font-semibold text-slate-900">Release gate</h3>
    <p class="m-0 text-sm text-slate-500">Require human sign-off before publish.</p>
  </div>
  <tng-switch
    class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#0f172a]"
    [checked]="requireReview()"
    (checkedChange)="requireReview.set($event)"
  >
    Require review
  </tng-switch>
</section>
<br/>
<section class="grid w-full max-w-[32rem] gap-3 rounded-2xl border border-slate-300 bg-white p-4 text-slate-900 shadow-sm [color-scheme:light]">
  <tng-switch
    class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#0f172a]"
    [checked]="releaseEmails()"
    (checkedChange)="releaseEmails.set($event)"
  >
    Release summary email
  </tng-switch>
  <tng-switch
    class="[--tng-semantic-accent-brand:#2563eb] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-focus-ring:rgba(37,99,235,0.25)] [--tng-semantic-foreground-primary:#0f172a]"
    [checked]="freezeWindow()"
    (checkedChange)="freezeWindow.set($event)"
  >
    Freeze deploy window
  </tng-switch>
</section>
