<section class="mx-auto grid max-w-[34rem] gap-4 rounded-3xl border border-slate-200 bg-white p-5 text-slate-900 shadow-sm">
  <div class="grid gap-1">
    <span class="text-xs font-semibold text-slate-500">Country directory</span>
    <p class="m-0 text-sm text-slate-600">
      Wrapper-first autocomplete for standard country search.
    </p>
  </div>

  <tng-autocomplete
    class="block min-w-0 w-full [--tng-semantic-background-canvas:#ffffff] [--tng-semantic-background-surface:#f1f5f9] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-border-strong:#94a3b8] [--tng-semantic-foreground-primary:#0f172a] [--tng-semantic-foreground-secondary:#475569] [--tng-semantic-foreground-muted:#64748b] [--tng-semantic-accent-brand:#2563eb] [--tng-semantic-focus-ring:#2563eb] [--tng-autocomplete-bg:#ffffff] [--tng-autocomplete-surface:#f1f5f9] [--tng-autocomplete-border:#cbd5e1] [--tng-autocomplete-border-strong:#94a3b8] [--tng-autocomplete-fg:#0f172a] [--tng-autocomplete-muted:#64748b] [--tng-autocomplete-brand:#2563eb] [--tng-autocomplete-focus-ring:#2563eb]"
    [options]="countries"
    [value]="selectedCountry()"
    (valueChange)="onSelectedCountryChange($event)"
    [getOptionValue]="getCountryValue"
    [getOptionLabel]="getCountryLabel"
    placeholder="Type Ind to filter"
    [ariaLabel]="'Country directory'"
  ></tng-autocomplete>

  <p class="m-0 text-xs text-slate-600">Selected: {{ selectedLabel() }}</p>
</section>

<br/>

<section class="mx-auto grid max-w-[34rem] gap-4 rounded-3xl border border-slate-200 bg-white p-5 text-slate-900 shadow-sm">
  <div class="grid gap-1">
    <span class="text-xs font-semibold text-slate-500">Release owner</span>
    <p class="m-0 text-sm text-slate-600">
      Host-level semantic tokens restyle the wrapper cleanly from a utility-first shell.
    </p>
  </div>

  <tng-autocomplete
    class="block w-full [--tng-semantic-background-canvas:#ffffff] [--tng-semantic-background-surface:#f8fafc] [--tng-semantic-border-subtle:#cbd5e1] [--tng-semantic-border-strong:#cbd5e1] [--tng-semantic-foreground-primary:#0f172a] [--tng-semantic-foreground-secondary:#475569] [--tng-semantic-foreground-muted:#64748b] [--tng-semantic-accent-brand:#0f766e] [--tng-semantic-focus-ring:#0f766e]"
    [options]="releaseOwners"
    [value]="selectedOwner()"
    (valueChange)="onSelectedOwnerChange($event)"
    [getOptionValue]="getOwnerValue"
    [getOptionLabel]="getOwnerLabel"
    [isOptionDisabled]="isOwnerDisabled"
    placeholder="Assign a release owner"
    [ariaLabel]="'Release owner'"
  ></tng-autocomplete>

  <p class="m-0 text-xs text-slate-600">Selected: {{ selectedSummary() }}</p>
</section>
